{% extends "base.html" %}

{% block title %}대시보드 - Asset Tracker{% endblock %}

{% block content %}
<div class="header-section">
    <h1>대시보드</h1>
    <div class="filters">
        <!-- 필터 등 -->
    </div>
</div>

<div class="summary-cards">
    <div class="stat-card">
        <i data-lucide="arrow-down-circle" class="icon-deposit"></i>
        <div class="stat-info">
            <span class="label">총 입금액</span>
            <span class="value" id="totalDeposit">₩0</span>
        </div>
    </div>
    <div class="stat-card">
        <i data-lucide="arrow-up-circle" class="icon-withdrawal"></i>
        <div class="stat-info">
            <span class="label">총 출금액</span>
            <span class="value" id="totalWithdrawal">₩0</span>
        </div>
    </div>
    <div class="stat-card">
        <i data-lucide="wallet" class="icon-net"></i>
        <div class="stat-info">
            <span class="label">순 금액</span>
            <span class="value" id="netAmount">₩0</span>
        </div>
    </div>
    <div class="stat-card">
        <i data-lucide="users" class="icon-primary"></i>
        <div class="stat-info">
            <span class="label">등록된 인물</span>
            <span class="value" id="personCount">0명</span>
        </div>
    </div>
    <div class="stat-card">
        <i data-lucide="list-ordered" class="icon-secondary"></i>
        <div class="stat-info">
            <span class="label">총 거래 건수</span>
            <span class="value" id="txCount">0건</span>
        </div>
    </div>
    <div class="stat-card">
        <i data-lucide="trending-up" class="icon-accent"></i>
        <div class="stat-info">
            <span class="label">실현 손익(주식)</span>
            <span class="value" id="stockPnl">₩0</span>
        </div>
    </div>
</div>

<div class="chart-grid">
    <div class="chart-card span-2">
        <h3>월별 입출금 추이</h3>
        <div id="chartMonthly" class="chart-container"></div>
    </div>
    <div class="chart-card">
        <h3>인물별 거래 비중</h3>
        <div id="chartPeopleShare" class="chart-container"></div>
    </div>
    <div class="chart-card span-2">
        <h3>누적 순자산 흐름</h3>
        <div id="chartCumulative" class="chart-container"></div>
    </div>
    <div class="chart-card span-1">
        <h3>계좌별 비교</h3>
        <div id="chartAccount" class="chart-container"></div>
    </div>
    <div class="chart-card span-3">
        <h3>거래 히트맵</h3>
        <div id="chartHeatmap" class="chart-container"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
